    function carregarInimigos(lista) {
        x = 0
        y = 0
        campo.innerHTML = '<div id="player"></div>'
        for (let i = 0; i < lista.length; i++) {
            let inimigo = lista[i]
            campo.innerHTML += `<div class="${inimigo.tipo}" style="top:${inimigo.top};left:${inimigo.left};width:${inimigo.width};height:${inimigo.height}" ${inimigo.tipo =='quiz'?`id="quizCirculo${inimigo.quiz}"`:''}>
                ${inimigo.tipo =='quiz'?`Quiz: ${inimigo.quiz}`:''}
                
                </div>`
        }

    }
    carregarInimigos(listaObstaculoFase2)

    function andar(key) {
        if (key == 'a') {
            x -= 10
        }
        if (key == 'd') {
            x += 10
        }
        if (key == 's') {
            y += 10
        }
        if (key == 'w') {
            y -= 10
        }
        player.style.left = x + 'px'
        player.style.top = y + 'px'
        verificar(listaObstaculoFase2)
    }
    function verificar(lista) {

        for (let i = 0; i < lista.length; i++) {

            let inimigo = lista[i]

            let inimigoX = parseInt(inimigo.left)
            let inimigoY = parseInt(inimigo.top)
            let inimigoWidth = parseInt(inimigo.width)
            let inimigoHeight = parseInt(inimigo.height)

            let tamanhoPlayer = 20

            let colidiu =
                x < inimigoX + inimigoWidth &&
                x + tamanhoPlayer > inimigoX &&
                y < inimigoY + inimigoHeight &&
                y + tamanhoPlayer > inimigoY


            if (colidiu) {
                if(inimigo.tipo =='inimigo'){
                    carregarInimigos(listaObstaculoFase1)
                }else if(inimigo.tipo =='quiz'){
                    carregarQuiz(inimigo.quizInfo,inimigo.quiz)
                }
            }
        }
        
    }
   
</script>
